<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="popup-shell" class="popup-shell">
    <div id="app-toast" class="app-toast hidden" role="status" aria-live="polite"></div>
    <header id="topbar" class="topbar">
      <div class="topbar-copy">
        <span id="topbar-kicker" class="topbar-kicker"></span>
        <span id="topbar-title" class="topbar-title"></span>
      </div>
      <div class="topbar-actions">
        <a id="help-support-link" class="topbar-link" target="_blank" rel="noreferrer"></a>
        <button id="btn-settings" class="icon-btn" type="button"></button>
      </div>
    </header>

    <main id="app" class="app-shell">
      <section id="screen-loading" class="screen hidden">
        <div class="state-header olive">
          <div id="loading-kicker" class="header-kicker"></div>
          <h2 id="loading-title" class="header-title"></h2>
          <p id="loading-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div class="banner soft">
            <span id="loading-text"></span>
          </div>
          <div class="skeleton-stack" aria-hidden="true">
            <div class="skeleton-card">
              <div class="skeleton-line wide"></div>
              <div class="skeleton-line med"></div>
              <div class="skeleton-line short"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-line med"></div>
              <div class="skeleton-line wide"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-error" class="screen hidden">
        <div class="state-header red">
          <div id="error-kicker" class="header-kicker"></div>
          <h2 id="error-title" class="header-title"></h2>
          <p id="error-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div class="banner error">
            <span id="error-detail"></span>
          </div>
        </div>
      </section>

      <section id="screen-setup" class="screen hidden">
        <div class="state-header amber">
          <div id="setup-kicker" class="header-kicker"></div>
          <h2 id="setup-title" class="header-title"></h2>
          <p id="setup-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div class="action-stack">
            <label class="field" for="api-token-input">
              <span id="setup-token-label"></span>
              <input id="api-token-input" class="input" type="password" />
            </label>
            <button id="btn-save-token" class="button primary" type="button"></button>
          </div>
          <div id="setup-helper" class="banner soft"></div>
          <div id="setup-error" class="banner error hidden"></div>
        </div>
      </section>

      <section id="screen-activate" class="screen hidden">
        <div class="state-header green">
          <div id="activate-kicker" class="header-kicker"></div>
          <h2 id="activate-title" class="header-title"></h2>
          <p id="activate-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div id="activate-message" class="banner soft"></div>
          <button id="btn-open-masar-activate" class="button primary" type="button"></button>
        </div>
      </section>

      <section id="screen-session-expired" class="screen hidden">
        <div class="state-header red">
          <div id="session-kicker" class="header-kicker"></div>
          <h2 id="session-title" class="header-title"></h2>
          <p id="session-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div id="session-expired-text" class="banner error"></div>
          <button id="btn-open-masar-expired" class="button primary" type="button"></button>
        </div>
      </section>

      <section id="screen-main" class="screen hidden">
        <div class="state-header olive">
          <div id="main-kicker" class="header-kicker"></div>
          <h2 id="main-title" class="header-title"></h2>
          <p id="main-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body workspace-body">
<div id="submission-progress-banner" class="submission-banner hidden">
            <div class="submission-banner-copy">
              <div id="submission-progress-title" class="submission-banner-title"></div>
              <div id="submission-progress-summary" class="submission-banner-summary"></div>
              <div id="submission-progress-detail" class="submission-banner-detail"></div>
            </div>
            <div class="submission-banner-actions">
              <button id="submission-resume-btn" class="mini-btn primary hidden" type="button"></button>
              <button id="submission-refresh-btn" class="mini-btn ghost" type="button"></button>
            </div>
          </div>

          <div id="home-summary" class="summary-strip">
            <div class="summary-head">
              <div>
                <div id="workspace-summary-title" class="summary-title"></div>
                <div id="workspace-summary-subtitle" class="summary-meta"></div>
              </div>
              <div id="contract-state-pill" class="pill hidden"></div>
            </div>
            <div class="summary-grid">
              <div class="summary-cell">
                <div id="home-office-label" class="key"></div>
                <div id="ctx-entity" class="value"></div>
              </div>
              <div class="summary-cell">
                <div id="home-contract-label" class="key"></div>
                <div id="ctx-contract" class="value"></div>
              </div>
              <div class="summary-cell metrics-cell">
                <div class="metric-grid">
                  <div class="metric-box">
                    <div id="home-pending-label" class="key"></div>
                    <div id="metric-pending" class="metric-value"></div>
                  </div>
                  <div class="metric-box">
                    <div id="home-failed-label" class="key"></div>
                    <div id="metric-failed" class="metric-value"></div>
                  </div>
                  <div class="metric-box">
                    <div id="home-submitted-label" class="key"></div>
                    <div id="metric-submitted" class="metric-value"></div>
                  </div>

                </div>
              </div>
            </div>
          </div>

          <div id="contact-defaults-nudge" class="banner soft hidden">
            <span id="contact-defaults-nudge-text"></span>
            <button id="contact-defaults-nudge-btn" class="mini-btn primary" type="button"></button>
          </div>

          <div id="contract-dropdown-container" class="contract-box hidden">
            <label class="field" for="contract-select">
              <span id="contract-select-label"></span>
              <select id="contract-select" class="select"></select>
            </label>
            <div id="contract-empty-state" class="contract-empty hidden" role="status" aria-live="polite"></div>
          </div>

          <div class="toolbar button-row">
            <button id="btn-refresh-context" class="button secondary" type="button"></button>
          </div>

          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="pending" type="button">
              <span class="tab-label" id="tab-label-pending"></span>
            </button>
            <button class="tab" data-tab="inProgress" type="button">
              <span class="tab-label" id="tab-label-in-progress"></span>
            </button>
            <button class="tab" data-tab="submitted" type="button">
              <span class="tab-label" id="tab-label-submitted"></span>
            </button>
            <button class="tab" data-tab="failed" type="button">
              <span class="tab-label" id="tab-label-failed"></span>
            </button>
          </div>

          <div class="queue">
            <div class="queue-head">
              <div>
                <div id="pending-title" class="queue-title"></div>
                <div id="workspace-empty-note" class="queue-sub"></div>
              </div>
              <button id="submit-all-btn" class="button secondary" type="button"></button>
            </div>

            <section id="pending-section" class="tab-panel section-block">
              <div id="pending-list" class="records-grid"></div>
              <button id="pending-load-more" class="button secondary hidden" type="button"></button>
            </section>

            <section id="in-progress-section" class="tab-panel section-block hidden">
              <div class="section-header">
                <h3 id="in-progress-title" class="section-title"></h3>
              </div>
              <div id="in-progress-list" class="records-grid"></div>
            </section>

            <section id="submitted-section" class="tab-panel section-block hidden">
              <div class="section-header">
                <h3 id="submitted-title" class="section-title"></h3>
              </div>
              <div id="submitted-list" class="records-grid"></div>
              <button id="submitted-load-more" class="button secondary hidden" type="button"></button>
            </section>

            <section id="failed-section" class="tab-panel section-block hidden">
              <div class="section-header">
                <h3 id="failed-title" class="section-title"></h3>
              </div>
              <div id="failed-list" class="records-grid"></div>
              <button id="failed-load-more" class="button secondary hidden" type="button"></button>
            </section>
          </div>
        </div>
      </section>

      <section id="screen-settings" class="screen hidden">
        <div class="state-header amber">
          <div id="settings-kicker" class="header-kicker"></div>
          <h2 id="settings-title" class="header-title"></h2>
          <p id="settings-subtitle" class="header-subtitle"></p>
        </div>
        <div class="screen-body">
          <div class="button-row settings-nav">
            <button id="btn-back" class="button secondary" type="button"></button>
          </div>
          <div class="banner soft">
            <strong id="settings-contact-hint-title"></strong>
            <p id="settings-contact-hint-body" style="margin:0.25rem 0 0;font-size:0.8rem;opacity:0.85;"></p>
          </div>
          <label class="field" for="settings-email">
            <span id="settings-email-label"></span>
            <input id="settings-email" class="input" type="email" />
          </label>
          <label class="field" for="settings-phone-cc">
            <span id="settings-phone-cc-label"></span>
            <input id="settings-phone-cc" class="input" type="text" maxlength="5" />
          </label>
          <label class="field" for="settings-phone">
            <span id="settings-phone-label"></span>
            <input id="settings-phone" class="input" type="tel" />
          </label>
          <button id="btn-save-settings" class="button primary" type="button"></button>
          <button id="btn-reset-token" class="button danger" type="button"></button>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="strings.js"></script>
  <script src="status.js"></script>
  <script src="context-change.js"></script>
  <script src="contract-select.js"></script>
  <script src="queue-filter.js"></script>
  <script src="popup-failure.js"></script>
  <script src="tab-data-store.js"></script>
  <script src="tab-fetch-coordinator.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
