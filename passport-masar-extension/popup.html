<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="topbar">
    <span id="topbar-title"></span>
    <div class="topbar-actions">
      <a id="help-support-link" class="text-link" target="_blank" rel="noreferrer"></a>
      <button id="btn-settings" class="icon-btn" type="button"></button>
    </div>
  </div>

  <div id="app">
    <section id="screen-loading" class="screen hidden">
      <div class="status-banner info">
        <span id="loading-text"></span>
      </div>
    </section>

    <section id="screen-error" class="screen hidden">
      <div class="status-banner error">
        <strong id="error-title"></strong>
        <span id="error-detail"></span>
      </div>
    </section>

    <section id="screen-setup" class="screen hidden">
      <h2 id="setup-title"></h2>
      <label id="setup-token-label" for="api-token-input"></label>
      <input id="api-token-input" type="password" />
      <button id="btn-save-token" type="button"></button>
      <div id="setup-error" class="status-banner error hidden"></div>
    </section>

    <section id="screen-activate" class="screen hidden">
      <div id="activate-message" class="status-banner warning"></div>
      <button id="btn-open-masar-activate" type="button"></button>
    </section>

    <section id="screen-session-expired" class="screen hidden">
      <div id="session-expired-text" class="status-banner error"></div>
      <button id="btn-open-masar-expired" type="button"></button>
    </section>

    <section id="screen-group-select" class="screen hidden">
      <h2 id="group-title"></h2>
      <div id="group-select-hint" class="status-banner warning hidden"></div>
      <select id="group-select"></select>
      <button id="btn-confirm-group" type="button"></button>
    </section>

    <section id="screen-main" class="screen hidden">
      <div id="context-change-banner" class="status-banner warning hidden">
        <span id="context-change-text"></span>
        <div class="banner-actions">
          <button id="ctx-change-confirm" type="button"></button>
          <button id="ctx-change-defer" class="ghost-btn" type="button"></button>
        </div>
      </div>

      <div id="home-summary" class="summary-strip">
        <div class="summary-primary">
          <div class="summary-block">
            <span class="summary-label" id="home-office-label"></span>
            <strong id="ctx-entity"></strong>
          </div>
          <div class="summary-block">
            <span class="summary-label" id="home-contract-label"></span>
            <strong id="ctx-contract"></strong>
          </div>
        </div>
        <div class="summary-secondary">
          <span id="ctx-group" class="summary-pill"></span>
          <span id="contract-state-pill" class="summary-pill hidden"></span>
        </div>
        <div class="summary-metrics">
          <div class="metric">
            <span class="metric-label" id="home-pending-label"></span>
            <strong id="pending-count"></strong>
          </div>
          <div class="metric">
            <span class="metric-label" id="home-failed-label"></span>
            <strong id="failed-count"></strong>
          </div>
        </div>
      </div>

      <div id="contract-dropdown-container" class="contract-selector hidden">
        <select id="contract-select"></select>
      </div>

      <div class="toolbar">
        <button id="btn-change-group" class="ghost-btn" type="button"></button>
        <button id="btn-refresh-context" class="ghost-btn" type="button"></button>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="pending" type="button">
          <span class="tab-label" id="tab-label-pending"></span>
          <span class="tab-count" id="tab-count-pending"></span>
        </button>
        <button class="tab" data-tab="inProgress" type="button">
          <span class="tab-label" id="tab-label-in-progress"></span>
          <span class="tab-count" id="tab-count-in-progress"></span>
        </button>
        <button class="tab" data-tab="submitted" type="button">
          <span class="tab-label" id="tab-label-submitted"></span>
          <span class="tab-count" id="tab-count-submitted"></span>
        </button>
        <button class="tab" data-tab="failed" type="button">
          <span class="tab-label" id="tab-label-failed"></span>
          <span class="tab-count" id="tab-count-failed"></span>
        </button>
      </div>

      <section id="pending-section" class="tab-panel">
        <div class="section-header">
          <h3 id="pending-title"></h3>
          <button id="submit-all-btn" type="button"></button>
        </div>
        <div id="pending-list" class="records-grid"></div>
      </section>

      <section id="in-progress-section" class="tab-panel hidden">
        <div class="section-header">
          <h3 id="in-progress-title"></h3>
        </div>
        <div id="in-progress-list" class="records-grid"></div>
      </section>

      <section id="submitted-section" class="tab-panel hidden">
        <div class="section-header">
          <h3 id="submitted-title"></h3>
        </div>
        <div id="submitted-list" class="records-grid"></div>
      </section>

      <section id="failed-section" class="tab-panel hidden">
        <div class="section-header">
          <h3 id="failed-title"></h3>
        </div>
        <div id="failed-list" class="records-grid"></div>
      </section>
    </section>

    <section id="screen-settings" class="screen hidden">
      <div class="section-header">
        <button id="btn-back" class="ghost-btn" type="button"></button>
        <h2 id="settings-title"></h2>
      </div>
      <label id="settings-email-label" for="settings-email"></label>
      <input id="settings-email" type="email" />
      <label id="settings-phone-cc-label" for="settings-phone-cc"></label>
      <input id="settings-phone-cc" type="text" maxlength="5" />
      <label id="settings-phone-label" for="settings-phone"></label>
      <input id="settings-phone" type="tel" />
      <button id="btn-save-settings" type="button"></button>
      <button id="btn-reset-token" class="danger-btn" type="button"></button>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="popup-failure.js"></script>
  <script src="strings.js"></script>
  <script src="status.js"></script>
  <script src="queue-filter.js"></script>
  <script src="context-change.js"></script>
  <script src="contract-select.js"></script>
  <script src="popup.js"></script>
</body>
</html>
