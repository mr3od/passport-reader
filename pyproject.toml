[tool.uv]
package = false
default-groups = ["dev"]

[tool.uv.workspace]
members = [
  "passport-admin-bot",
  "passport-api",
  "passport-benchmark",
  "passport-core",
  "passport-platform",
  "passport-telegram",
]

[tool.uv.sources]
passport-admin-bot = { workspace = true }
passport-core = { workspace = true }
passport-platform = { workspace = true }
passport-api = { workspace = true }
passport-telegram = { workspace = true }
passport-benchmark = { workspace = true }

[dependency-groups]
dev = [
  "import-linter>=2.9",
  "pytest>=8.3.2",
  "pytest-cov>=5.0.0",
  "ruff>=0.6.4",
  "ty>=0.0.24",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "A", "SIM", "RET", "PTH"]

[tool.pytest.ini_options]
testpaths = [
  "passport-admin-bot/tests",
  "passport-core/tests",
  "passport-platform/tests",
  "passport-api/tests",
  "passport-telegram/tests",
  "passport-benchmark/tests",
]

[tool.ty.src]
exclude = ["browser-session/**"]
