apiVersion: batch/v1
kind: Job
metadata:
  name: passport-api-seed
  namespace: passport-reader
  labels:
    app.kubernetes.io/name: passport-api-seed
    app.kubernetes.io/component: management
    app.kubernetes.io/part-of: passport-reader
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: passport-api-seed
        app.kubernetes.io/component: management
        app.kubernetes.io/part-of: passport-reader
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: regcred
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: registry.mohammed-alkebsi.dev/mohammed/passport-reader:latest
          imagePullPolicy: Always
          command: ["passport-platform-seed"]
          envFrom:
            - secretRef:
                name: passport-reader-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: passport-reader-data
