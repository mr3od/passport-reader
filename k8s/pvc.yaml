apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: passport-reader-data
  namespace: passport-reader
  labels:
    app.kubernetes.io/name: passport-reader-data
    app.kubernetes.io/part-of: passport-reader
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
