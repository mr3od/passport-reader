apiVersion: apps/v1
kind: Deployment
metadata:
  name: passport-api
  namespace: passport-reader
  labels:
    app.kubernetes.io/name: passport-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: passport-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: passport-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: passport-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: passport-reader
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: passport-api
          image: localhost:32000/passport-reader:latest
          imagePullPolicy: Always
          command: ["python", "-m", "passport_api.cli"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: passport-reader-env
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: passport-reader-data
