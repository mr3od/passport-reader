name: Deploy to MicroK8s

on:
  push:
    branches:
      - main
      - production
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy to MicroK8s
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run deployment script
        run: |
          cd /home/mohammed.k/kiro-projects/passport-reader
          git pull origin main
          ./deploy.sh deploy
      
      - name: Verify deployment
        if: always()
        run: |
          cd /home/mohammed.k/kiro-projects/passport-reader
          ./deploy.sh status
          ./deploy.sh logs 50
