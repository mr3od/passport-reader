name: Deploy to MicroK8s

on:
  push:
    branches:
      - main
      - production
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to MicroK8s
    runs-on: ubuntu-latest
    env:
      K8S_NAMESPACE: passport-reader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.env.production' \
            --exclude='data/' \
            --exclude='__pycache__/' \
            --exclude='.venv/' \
            --exclude='*.pyc' \
            ./ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/

      - name: Build and apply manifests on MicroK8s
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST "
            set -euo pipefail
            cd $DEPLOY_PATH

            if [ ! -f .env.production ]; then
              echo 'Missing .env.production on server' >&2
              exit 1
            fi

            if ! id -nG | tr ' ' '\n' | grep -qx microk8s; then
              echo 'Deploy user is not in microk8s group.' >&2
              exit 1
            fi

            if ! microk8s status >/dev/null 2>&1; then
              echo 'microk8s is not accessible for this deploy user.' >&2
              exit 1
            fi

            kctl() { microk8s kubectl \"\$@\"; }

            echo 'Ensuring required MicroK8s addons are enabled'
            microk8s enable ingress
            microk8s enable cert-manager
            kctl -n cert-manager rollout status deploy/cert-manager --timeout=180s
            kctl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=180s
            kctl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s

            IMAGE='passport-reader:${IMAGE_TAG}'
            docker build -t \"\$IMAGE\" .
            docker save \"\$IMAGE\" | microk8s images import

            kctl apply -f k8s/namespace.yaml
            kctl apply -f k8s/cluster-issuer.yaml
            kctl -n ${K8S_NAMESPACE} create secret generic passport-reader-env \
              --from-env-file=.env.production \
              --dry-run=client -o yaml | kctl apply -f -
            kctl apply -f k8s/pvc.yaml
            kctl apply -f k8s/api-deployment.yaml
            kctl apply -f k8s/api-service.yaml
            kctl apply -f k8s/api-ingress.yaml
            kctl apply -f k8s/telegram-deployment.yaml

            kctl -n ${K8S_NAMESPACE} set image deploy/passport-api passport-api=\"\$IMAGE\"
            kctl -n ${K8S_NAMESPACE} set image deploy/passport-telegram passport-telegram=\"\$IMAGE\"

            kctl -n ${K8S_NAMESPACE} rollout status deploy/passport-api --timeout=180s
            kctl -n ${K8S_NAMESPACE} rollout status deploy/passport-telegram --timeout=180s
          "

      - name: Verify deployment
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST "
            set -euo pipefail
            cd $DEPLOY_PATH
            kctl() { microk8s kubectl \"\$@\"; }
            kctl -n ${K8S_NAMESPACE} get deploy,pods,svc,pvc,ingress
            kctl get clusterissuer letsencrypt-production || true
            kctl -n ${K8S_NAMESPACE} get certificate,certificaterequest,challenge,order || true
            kctl -n ${K8S_NAMESPACE} logs deploy/passport-api --tail=80 || true
            kctl -n ${K8S_NAMESPACE} logs deploy/passport-telegram --tail=80 || true
          "
