name: Deploy to MicroK8s

on:
  push:
    branches:
      - main
      - production
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to MicroK8s
    runs-on: ubuntu-latest
    env:
      K8S_NAMESPACE: passport-reader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Configure local registry access
        run: |
          sudo python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("/etc/docker/daemon.json")
          data = {}
          if path.exists():
              data = json.loads(path.read_text())

          registries = data.setdefault("insecure-registries", [])
          if "localhost:32000" not in registries:
              registries.append("localhost:32000")

          path.write_text(json.dumps(data))
          PY

          sudo systemctl restart docker
          docker info | grep -A5 'Insecure Registries'

      - name: Sync code to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.env.production' \
            --exclude='data/' \
            --exclude='__pycache__/' \
            --exclude='.venv/' \
            --exclude='*.pyc' \
            ./ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/

      - name: Open SSH tunnel to MicroK8s registry
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -fNT \
            -L 32000:127.0.0.1:32000 \
            $SERVER_USER@$SERVER_HOST

          curl -fsS http://localhost:32000/v2/

      - name: Build and push Docker image
        id: image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_BASE="localhost:32000/passport-reader"
          IMMUTABLE_IMAGE="${IMAGE_BASE}:${IMAGE_TAG}"

          docker build -t "$IMMUTABLE_IMAGE" .
          docker push "$IMMUTABLE_IMAGE"
          docker tag "$IMMUTABLE_IMAGE" "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:latest"

          echo "immutable_image=$IMMUTABLE_IMAGE" >> $GITHUB_OUTPUT

      - name: Apply manifests on MicroK8s
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
          IMMUTABLE_IMAGE: ${{ steps.image.outputs.immutable_image }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST "
            set -euo pipefail
            cd $DEPLOY_PATH
            IMMUTABLE_IMAGE='${IMMUTABLE_IMAGE}'

            if [ ! -f .env.production ]; then
              echo 'Missing .env.production on server' >&2
              exit 1
            fi

            if ! id -nG | tr ' ' '\n' | grep -qx microk8s; then
              echo 'Deploy user is not in microk8s group.' >&2
              exit 1
            fi

            if ! microk8s status >/dev/null 2>&1; then
              echo 'microk8s is not accessible for this deploy user.' >&2
              exit 1
            fi

            kctl() { microk8s kubectl \"\$@\"; }

            echo 'Ensuring required MicroK8s addons are enabled'
            microk8s enable ingress
            microk8s enable cert-manager
            kctl -n cert-manager rollout status deploy/cert-manager --timeout=180s
            kctl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=180s
            kctl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s

            if ! curl -fsS http://localhost:32000/v2/ >/dev/null; then
              echo 'MicroK8s registry is not reachable on localhost:32000.' >&2
              exit 1
            fi

            kctl apply -f k8s/namespace.yaml
            kctl apply -f k8s/cluster-issuer.yaml
            kctl -n ${K8S_NAMESPACE} create secret generic passport-reader-env \
              --from-env-file=.env.production \
              --dry-run=client -o yaml | kctl apply -f -
            kctl apply -f k8s/pvc.yaml
            kctl apply -f k8s/api-deployment.yaml
            kctl apply -f k8s/api-service.yaml
            kctl apply -f k8s/api-ingress.yaml
            kctl apply -f k8s/telegram-deployment.yaml
            kctl apply -f k8s/admin-bot-deployment.yaml
            kctl -n ${K8S_NAMESPACE} delete deploy passport-telegram-bot --ignore-not-found

            kctl -n ${K8S_NAMESPACE} set image deploy/passport-api passport-api=\"\$IMMUTABLE_IMAGE\"
            kctl -n ${K8S_NAMESPACE} set image deploy/passport-telegram passport-telegram=\"\$IMMUTABLE_IMAGE\"
            kctl -n ${K8S_NAMESPACE} set image deploy/passport-admin-bot passport-admin-bot=\"\$IMMUTABLE_IMAGE\"

            kctl -n ${K8S_NAMESPACE} rollout status deploy/passport-api --timeout=180s
            kctl -n ${K8S_NAMESPACE} rollout status deploy/passport-telegram --timeout=180s
            kctl -n ${K8S_NAMESPACE} rollout status deploy/passport-admin-bot --timeout=180s
          "

      - name: Verify deployment
        if: always()
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          ssh $SERVER_USER@$SERVER_HOST "
            set -euo pipefail
            cd $DEPLOY_PATH
            kctl() { microk8s kubectl \"\$@\"; }
            kctl -n ${K8S_NAMESPACE} get deploy,pods,svc,pvc,ingress
            kctl get clusterissuer letsencrypt-production || true
            kctl -n ${K8S_NAMESPACE} get certificate,certificaterequest,challenge,order || true
            kctl -n ${K8S_NAMESPACE} logs deploy/passport-api --tail=80 || true
            kctl -n ${K8S_NAMESPACE} logs deploy/passport-telegram --tail=80 || true
            kctl -n ${K8S_NAMESPACE} logs deploy/passport-admin-bot --tail=80 || true
          "
