services:
  telegram:
    build: .
    image: passport-reader:latest
    command: passport-telegram
    env_file: .env.production
    volumes:
      - passport-data:/data
    restart: unless-stopped

  api:
    build: .
    image: passport-reader:latest
    command: passport-api
    env_file: .env.production
    volumes:
      - passport-data:/data
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  passport-data:
